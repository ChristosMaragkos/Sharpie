name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            runner_bin: Sharpie
            cli_bin: sharpie
          - os: windows-latest
            rid: win-x64
            runner_bin: Sharpie.exe
            cli_bin: sharpie.exe
          - os: windows-11-arm
            rid: win-arm64
            runner_bin: Sharpie.exe
            cli_bin: sharpie.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache raylib DLL for Windows ARM64
        if: matrix.rid == 'win-arm64'
        id: cache-raylib
        uses: actions/cache@v4
        with:
          path: src/Sharpie.Runner/RaylibCs/libs/win-arm64/native/raylib.dll
          key: raylib-5.5-win-arm64

      - name: Build raylib from source for Windows on ARM
        if: matrix.rid == 'win-arm64' && steps.cache-raylib.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git
          cd raylib

          mkdir build
          cd build

          cmake .. -A ARM64 -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=OFF

          cmake --build . --config Release

          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/src/Sharpie.Runner/RaylibCs/libs/win-arm64/native"

          Copy-Item "raylib/Release/raylib.dll" "${{ github.workspace }}/src/Sharpie.Runner/RaylibCs/libs/win-arm64/native/raylib.dll"

          Get-ChildItem "${{ github.workspace }}/src/Sharpie.Runner/RaylibCs/libs/win-arm64/native/"

      - name: Publish CLI
        run: |
          dotnet publish ./src/Sharpie.Cli/Sharpie.Cli.csproj -c Release -r ${{ matrix.rid }} -o ./pub-cli

      - name: Publish Raylib Runner
        run: |
          dotnet publish ./src/Sharpie.Runner/RaylibCs/Sharpie.Runner.RaylibCs.csproj -c Release -r ${{ matrix.rid }} -o ./pub-runner

      - name: Assemble Packages
        shell: bash
        run: |
          cp assets/RELEASE_README.md ./pub-runner/README.md
          cp LICENSE.md ./pub-runner/LICENSE.txt

          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            cp assets/icons/icon.png ./pub-runner/
            cp assets/linux/sharpie-raylib.desktop ./pub-runner/
          fi

          mkdir -p ./pub-cli/docs/
          mkdir -p ./pub-cli/include/
          cp src/Sharpie.CCompiler/fixtures/headers/sharpie.h ./pub-cli/include/

          cp docs/*.md ./pub-cli/docs/ || true
          cp LICENSE.md ./pub-cli/LICENSE.txt

      - name: Assemble Linux Packages
        if: matrix.os == 'ubuntu-latest'
        run: |
          strip ./pub-cli/${{ matrix.cli_bin }}
          strip ./pub-runner/${{ matrix.runner_bin }}

          tar -cJf sharpie-cli-${{ matrix.rid }}.tar.xz -C pub-cli .
          tar -cJf sharpie-runner-${{ matrix.rid }}.tar.xz -C pub-runner .

      - name: Assemble Windows Packages
        if: matrix.os != 'ubuntu-latest'
        shell: pwsh
        run: |
          7z a "sharpie-cli-${{ matrix.rid }}.zip" ./pub-cli/*
          7z a "sharpie-runner-${{ matrix.rid }}.zip" ./pub-runner/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sharpie-packages-${{ matrix.rid }}
          path: "sharpie-*"

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Publish Web Runner
        run: |
          dotnet publish ./src/Sharpie.Runner/Web/Sharpie.Runner.Web.csproj -c Release

      - name: Assemble Web Package
        run: |
          cd src/Sharpie.Runner/Web/bin/Release/net10.0/browser-wasm/AppBundle
          zip -r ${{ github.workspace }}/sharpie-runner-web.zip .
          cd ${{ github.workspace }}

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharpie-packages-web
          path: sharpie-runner-web.zip

      - name: Deploy Web Build to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: src/Sharpie.Runner/Web/bin/Release/net10.0/browser-wasm/AppBundle

  release:
    needs: [build, build-web]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine Release Type
        id: check-tag
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # If tag contains a dash, it's a prerelease (e.g. v0.4-alpha)
          if [[ "$TAG" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          prerelease: ${{ steps.check-tag.outputs.is_prerelease }}
          make_latest: ${{ steps.check-tag.outputs.make_latest }} # do not mark prereleases as latest
          body_path: assets/RELEASE_README.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
